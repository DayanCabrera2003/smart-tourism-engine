services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    networks:
      - sri-network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: smart-tourism-app
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      # Sobrescribimos la URL para que apunte al servicio de Qdrant en la red de Docker
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - sri-network

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: smart-tourism-ui
    restart: unless-stopped
    depends_on:
      - app
    environment:
      # La UI consume la API por el nombre del servicio en la red de Docker
      - SMART_TOURISM_API_URL=http://app:8000
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "src/ui/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
    networks:
      - sri-network

networks:
  sri-network:
    driver: bridge
